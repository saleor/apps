version: "3.8"

services:
  # Local DynamoDB for apps that require it
  avatax-dynamodb:
    image: amazon/dynamodb-local:latest
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath ./data"
    ports:
      - "8001:8000"
    volumes:
      - avatax-dynamodb-data:/home/dynamodblocal/data
    networks: [saleor-apps]

  segment-dynamodb:
    image: amazon/dynamodb-local:latest
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath ./data"
    ports:
      - "8002:8000"
    volumes:
      - segment-dynamodb-data:/home/dynamodblocal/data
    networks: [saleor-apps]

  avatax:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: app-avatax
        APP_PATH: avatax
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - APL=file
      - SECRET_KEY=${AVATAX_SECRET_KEY:-change-me}
      - ALLOWED_DOMAIN_PATTERN=${ALLOWED_DOMAIN_PATTERN:-.*}
      - APP_API_BASE_URL=http://localhost:3001
      - APP_IFRAME_BASE_URL=http://localhost:3001
      - PORT=3000
    depends_on:
      - avatax-dynamodb
    networks: [saleor-apps]

  cms:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: cms
        APP_PATH: cms
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - APL=file
      - SECRET_KEY=${CMS_SECRET_KEY:-change-me}
      - ALLOWED_DOMAIN_PATTERN=${ALLOWED_DOMAIN_PATTERN:-.*}
      - APP_API_BASE_URL=http://localhost:3002
      - APP_IFRAME_BASE_URL=http://localhost:3002
      - PORT=3000
    networks: [saleor-apps]

  cms-v2:
